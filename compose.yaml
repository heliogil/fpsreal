services:
  pcb_db:
    image: postgres:16-alpine
    container_name: pcb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pcb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pcb_db}
    ports:
      # Bind to loopback only — the DB is reached by pcb_api over the docker
      # network (pcb_db:5432). Never expose Postgres on the public interface;
      # host-level firewall (DOCKER-USER) does not cover this stack.
      - "127.0.0.1:5434:5432"
    volumes:
      - pcb_db_data:/var/lib/postgresql/data
    networks:
      - pcb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pcb_api:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: pcb_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pcb_db:5432/${POSTGRES_DB}
    ports:
      # Loopback only — public traffic reaches the API via nginx (/api/ ->
      # 127.0.0.1:8100). No need to publish on 0.0.0.0.
      - "127.0.0.1:8100:8100"
    depends_on:
      pcb_db:
        condition: service_healthy
    networks:
      - pcb_net
    volumes:
      - ./services/ingestion:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8100 --workers 2

  pcb_web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: pcb_web
    restart: unless-stopped
    ports:
      # Loopback only — public traffic reaches the web app via nginx
      # (location / -> 127.0.0.1:3100).
      - "127.0.0.1:3100:3100"
    environment:
      NEXT_PUBLIC_DATA_SOURCE: mock
      NEXT_PUBLIC_API_BASE: /api
      # Server-side (SSR) base for live pages like /pecas — internal docker DNS.
      PCB_API_INTERNAL: http://pcb_api:8100
    networks:
      - pcb_net
    depends_on:
      - pcb_api

networks:
  pcb_net:
    name: pcb_net
    driver: bridge

volumes:
  pcb_db_data:
    name: pcb_db_data
