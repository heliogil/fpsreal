services:
  pcb_db:
    image: postgres:16-alpine
    container_name: pcb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pcb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pcb_db}
    ports:
      - "5434:5432"
    volumes:
      - pcb_db_data:/var/lib/postgresql/data
    networks:
      - pcb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pcb_api:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: pcb_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pcb_db:5432/${POSTGRES_DB}
    ports:
      - "8100:8100"
    depends_on:
      pcb_db:
        condition: service_healthy
    networks:
      - pcb_net
    volumes:
      - ./services/ingestion:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8100 --reload

  # pcb_web (Next.js, port 3100) — added by factory

networks:
  pcb_net:
    name: pcb_net
    driver: bridge

volumes:
  pcb_db_data:
    name: pcb_db_data
