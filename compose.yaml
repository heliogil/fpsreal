services:
  pcb_db:
    image: postgres:16-alpine
    container_name: pcb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pcb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pcb_db}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pcb_db_data:/var/lib/postgresql/data
    networks:
      - pcb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pcb_api:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: pcb_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pcb_db:5432/${POSTGRES_DB}
    ports:
      - "127.0.0.1:8100:8100"
    depends_on:
      pcb_db:
        condition: service_healthy
    networks:
      - pcb_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: uvicorn main:app --host 0.0.0.0 --port 8100 --workers 2

  pcb_web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      network: host
    container_name: pcb_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      NEXT_PUBLIC_API_BASE: /api
      PCB_API_INTERNAL: http://pcb_api:8100
    networks:
      - pcb_net
    depends_on:
      - pcb_api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  pcb_net:
    name: pcb_net
    driver: bridge

volumes:
  pcb_db_data:
    name: pcb_db_data
